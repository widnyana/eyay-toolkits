# Example sprint-status.yaml
#
# Lives at: docs/_bmad_output/implementation-artifacts/sprint-status.yaml
# Generated by /bmad-sprint-planning. The sprint runner reads `development_status`
# to resolve the next action (STEP 1) and writes story/epic status transitions here.

project: my-app
story_location: docs/_bmad_output/implementation-artifacts

# Every key under development_status is one of three kinds, distinguished by key shape:
#   N-N-slug              -> a story   (epic number - story number - slug)
#   epic-N                -> an epic rollup
#   epic-N-retrospective  -> a retrospective marker
#
# Story status values: backlog | ready-for-dev | in-progress | review | done | blocked
# Epic status values:  backlog | in-progress | done | blocked
development_status:
  # Epic 1 — fully complete, retrospective still pending
  1-1-user-auth: done
  1-2-session-store: done
  epic-1: done
  epic-1-retrospective: backlog

  # Epic 2 — in progress: one story under review, one ready, one untouched
  2-1-api-gateway: review
  2-2-rate-limiting: ready-for-dev
  2-3-request-logging: backlog
  epic-2: in-progress

  # Epic 3 — not started; stories still need create-story
  3-1-dashboard-ui: backlog
  3-2-metrics-panel: backlog
  epic-3: backlog
